{% extends 'base.html' %}

{% block title %}Ajouter tranche RTS{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-plus-circle me-2"></i>Ajouter une tranche RTS</h2>
        <a href="{% url 'paie:liste_tranches_rts' %}?annee={{ annee }}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Retour
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">Nouvelle tranche — {{ annee }}</h5>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <input type="hidden" name="annee" value="{{ annee }}">

                        <div class="mb-3">
                            <label class="form-label fw-bold">N° tranche</label>
                            <input type="number" name="numero_tranche" class="form-control" value="1" min="1" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Borne inférieure (GNF)</label>
                                <input type="number" name="borne_inferieure" class="form-control" value="0" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Borne supérieure (GNF)</label>
                                <input type="number" name="borne_superieure" class="form-control"
                                       placeholder="Vide = illimité">
                                <small class="text-muted">Laisser vide pour la dernière tranche.</small>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Taux RTS (%)</label>
                            <input type="number" name="taux" class="form-control" value="0" step="0.01" min="0" max="100" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Type de barème</label>
                            <select name="type_bareme" class="form-select">
                                <option value="officiel" selected>Officiel (en vigueur)</option>
                                <option value="simulation">Simulation</option>
                                <option value="test">Test</option>
                            </select>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-check-lg me-1"></i>Ajouter
                            </button>
                            <a href="{% url 'paie:liste_tranches_rts' %}?annee={{ annee }}" class="btn btn-outline-secondary">Annuler</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
